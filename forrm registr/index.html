<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 1.3 Форма регистрации</title>
    
    <link rel="stylesheet" href="./styles.css">
    
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="container">
        <h2>Форма регистрации</h2>
        <div class="subtitle">Заполните данные для проверки доступа</div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" placeholder="Введите ваше имя">
            </div>
            
            <div class="form-group">
                <label for="age">Возраст</label>
                <input type="number" id="age" placeholder="От 1 до 100 лет" min="1" max="100">
                <div class="age-hint">Допустимый возраст: от 1 до 100 лет</div>
            </div>

            <button type="button" id="checkBtn" class="button">Проверить</button>
        </form>

        <div class="result-box" id="outputMessage">
            Ожидание ввода...
        </div>

        <div class="footer-note">
            JavaScript · проверка без перезагрузки
        </div>
    </div>
</body>
</html>
