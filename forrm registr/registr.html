<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 1.3 Форма регистрации</title>
    <style>
        /* Стили для страницы */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }
        
        body {
            background: #eef2f7;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            padding: 35px 30px;
        }
        
        h2 {
            font-size: 2rem;
            font-weight: 600;
            margin: 0 0 5px 0;
            color: #1f3a5f;
        }
        
        .subtitle {
            color: #4a6a8b;
            margin-bottom: 30px;
            border-left: 4px solid #3d5a80;
            padding-left: 15px;
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e2f44;
            margin-bottom: 6px;
        }
        
        input {
            width: 100%;
            padding: 15px 18px;
            font-size: 1.1rem;
            border: 2px solid #d0ddee;
            border-radius: 16px;
            outline: none;
            transition: 0.2s;
        }
        
        input:focus {
            border-color: #3d5a80;
            box-shadow: 0 0 0 3px rgba(61, 90, 128, 0.2);
        }
        
        input.error-border {
            border-color: #c44545;
            background: #fff5f5;
        }
        
        .button {
            background: #1f3a5f;
            color: white;
            border: none;
            padding: 16px 25px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 10px;
        }
        
        .button:hover {
            background: #2b4a78;
        }
        
        .result-box {
            background: #edf2f9;
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
            font-size: 1.2rem;
            font-weight: 500;
            border: 1px solid #c1d3e9;
            color: #102331;
            min-height: 80px;
            display: flex;
            align-items: center;
        }
        
        .footer-note {
            font-size: 0.85rem;
            color: #6b85a4;
            text-align: right;
            margin-top: 15px;
            border-top: 1px dashed #aec3dd;
            padding-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Форма регистрации</h2>
        <div class="subtitle">Заполните данные для проверки доступа</div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" placeholder="Введите ваше имя">
            </div>
            
            <div class="form-group">
                <label for="age">Возраст</label>
                <input type="number" id="age" placeholder="Сколько вам лет" min="1">
            </div>

            <button type="button" id="checkBtn" class="button">Проверить</button>
        </form>

        <div class="result-box" id="outputMessage">
            Ожидание ввода...
        </div>

        <div class="footer-note">
            JavaScript · проверка без перезагрузки
        </div>
    </div>

    <script>
        //Получаем ссылки на элементы страницы
        const usernameInput = document.getElementById('username');
        const ageInput = document.getElementById('age');
        const checkButton = document.getElementById('checkBtn');
        const outputDiv = document.getElementById('outputMessage');
        const form = document.getElementById('registerForm');

        //Функция для отображения сообщения
        function setMessage(text) {
            if (outputDiv) {
                outputDiv.textContent = text;
            }
        }

        //Функция для сброса ошибок
        function resetErrors() {
            if (usernameInput) usernameInput.classList.remove('error-border');
            if (ageInput) ageInput.classList.remove('error-border');
        }

        //Функция проверки и обработки данных
        function checkAccess() {
            // Сброс ошибок
            resetErrors();

            //Считываем значения
            const name = usernameInput ? usernameInput.value.trim() : '';
            const ageString = ageInput ? ageInput.value.trim() : '';

            //Проверка имени
            if (name === '') {
                setMessage('Ошибка: имя не может быть пустым');
                if (usernameInput) usernameInput.classList.add('error-border');
                return;
            }

            //Проверка возраста
            if (ageString === '') {
                setMessage('Ошибка: укажите возраст');
                if (ageInput) ageInput.classList.add('error-border');
                return;
            }

            const age = Number(ageString);
            
            //Проверка, что возраст - число больше 0
            if (isNaN(age) || age <= 0 || !Number.isInteger(age)) {
                setMessage('Ошибка: возраст должен быть целым числом больше 0');
                if (ageInput) ageInput.classList.add('error-border');
                return;
            }

            //Определение сообщения по возрасту
            let accessMessage = '';
            
            if (age < 18) {
                accessMessage = 'Доступ ограничен';
            } else if (age >= 18 && age <= 65) {
                accessMessage = 'Доступ разрешен';
            } else {
                accessMessage = 'Рекомендуется упрощенный режим';
            }

            //Выводим результат с именем
            setMessage(`${name}, ${accessMessage}`);
        }

        //Добавляем обработчик клика на кнопку
        if (checkButton) {
            checkButton.addEventListener('click', checkAccess);
        }

        //Блокируем отправку формы (на случай нажатия Enter)
        if (form) {
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                checkAccess();
            });
        }

        //Убираем красную рамку при начале ввода
        if (usernameInput) {
            usernameInput.addEventListener('input', function() {
                this.classList.remove('error-border');
            });
        }
        
        if (ageInput) {
            ageInput.addEventListener('input', function() {
                this.classList.remove('error-border');
            });
        }
    </script>
</body>
</html>
